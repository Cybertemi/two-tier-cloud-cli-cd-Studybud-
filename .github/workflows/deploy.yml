# .github/workflows/deploy.yml
name: CI/CD Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  DOCKERHUB_IMAGE: ${{ secrets.DOCKERHUB_USERNAME }}/studybud

jobs:

  # ── Job 1: Test ──────────────────────────────────────
  test:
    name: Test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run Django checks
        run: python manage.py check

      - name: Run tests
        run: python manage.py test

  # ── Job 2: Build & Push ──────────────────────────────
  build:
    name: Build & Push to Docker Hub
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build & push image
        run: |
          docker build -t $DOCKERHUB_IMAGE:${{ github.sha }} .
          docker push $DOCKERHUB_IMAGE:${{ github.sha }}
          docker tag $DOCKERHUB_IMAGE:${{ github.sha }} $DOCKERHUB_IMAGE:latest
          docker push $DOCKERHUB_IMAGE:latest

   # ── Job 3: Container Security Scan ───────────────────
  # ── Job 3: Container Security Scan ───────────────────
  scan:
    name: Security Scan
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
         username: ${{ secrets.DOCKERHUB_USERNAME }}
         password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Pull image for scanning
        run: docker pull ${{ secrets.DOCKERHUB_USERNAME }}/studybud:${{ github.sha }}
      
      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
         image-ref: ${{ secrets.DOCKERHUB_USERNAME }}/studybud:${{ github.sha }}
         format: table
         exit-code: '0'
         severity: 'CRITICAL,HIGH'
         scanners: 'vuln'

  # ── Job 4: Deploy to EC2 ─────────────────────────────
  deploy:
    name: Deploy to EC2
    runs-on: ubuntu-latest
    needs: scan

    steps:
      - uses: actions/checkout@v4

      - name: Copy deploy script to EC2
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          source: "scripts/deploy.sh"
          target: "/home/ubuntu/"
          strip_components: 1

      - name: SSH & run deploy
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            chmod +x /home/ubuntu/deploy.sh
            /home/ubuntu/scripts/deploy.sh \
              ${{ secrets.DOCKERHUB_USERNAME }}/studybud \
              ${{ github.sha }}
               ${{ secrets.DOMAIN }} \
               ${{ secrets.CERTBOT_EMAIL }}